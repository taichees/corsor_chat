<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coconala Thumbnail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800;900&family=Noto+Sans+JP:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #1247b7;
        --bg-2: #2f7bff;
        --panel: rgba(255, 255, 255, 0.14);
        --panel-border: rgba(255, 255, 255, 0.28);
        --text-main: #ffffff;
        --text-sub: #e8f1ff;
        --accent: #ffdf63;
        --campaign-1: #ff4b4b;
        --campaign-2: #ff7d2f;
        --font-body: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
        --font-display: "M PLUS Rounded 1c", "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1220px;
        height: 1016px;
        font-family: var(--font-body);
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      .canvas {
        width: 100%;
        height: 100%;
        color: var(--text-main);
        padding: 44px;
        background: radial-gradient(circle at 84% 16%, #5da3ff 0%, rgba(93, 163, 255, 0) 36%),
          radial-gradient(circle at 16% 84%, #4a8dff 0%, rgba(74, 141, 255, 0) 42%),
          linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 100%);
      }

      .campaign {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 14px 20px;
        border-radius: 16px;
        background: linear-gradient(90deg, var(--campaign-1) 0%, var(--campaign-2) 100%);
        border: 2px solid rgba(255, 255, 255, 0.28);
      }

      .campaign .left {
        font-size: 38px;
        font-weight: 900;
        letter-spacing: 0.01em;
        font-family: var(--font-display);
      }

      .campaign .right {
        background: #fff4d9;
        color: #a12500;
        padding: 4px 16px;
        border-radius: 999px;
        font-size: 42px;
        font-weight: 900;
        white-space: nowrap;
        font-family: var(--font-display);
      }

      .headline {
        margin-top: 26px;
        line-height: 1.2;
      }

      .headline .problem {
        font-size: 44px;
        font-weight: 800;
        font-family: var(--font-display);
      }

      .headline .solution {
        margin-top: 8px;
        font-size: 68px;
        font-weight: 900;
        font-family: var(--font-display);
      }

      .headline .solution span {
        color: var(--accent);
      }

      .cards {
        margin-top: 22px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .card {
        background: var(--panel);
        border: 2px solid var(--panel-border);
        border-radius: 14px;
        padding: 14px 16px;
      }

      .card-title {
        font-size: 28px;
        font-weight: 900;
        margin-bottom: 8px;
        font-family: var(--font-display);
      }

      .card ul {
        margin: 0;
        padding-left: 28px;
      }

      .card li {
        margin: 6px 0;
        font-size: 31px;
        font-weight: 700;
        color: var(--text-sub);
      }

      .fixed {
        margin-top: 20px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .pill {
        background: rgba(255, 255, 255, 0.95);
        color: #1542a8;
        border-radius: 12px;
        text-align: center;
        padding: 14px 10px;
      }

      .pill .label {
        font-size: 22px;
        font-weight: 800;
        line-height: 1.2;
      }

      .pill .value {
        margin-top: 4px;
        font-size: 44px;
        font-weight: 900;
        line-height: 1.1;
        font-family: var(--font-display);
      }

      .pill.price .value {
        color: #d62d00;
      }
    </style>
  </head>
  <body>
    <main class="canvas">
      <section class="campaign">
        <div class="left">先着5件限定キャンペーン実施中</div>
        <div class="right">今だけ 7,500円</div>
      </section>

      <section class="headline">
        <div class="problem">表示崩れ・不具合で困ったら</div>
        <div class="solution"><span>最短24時間</span>で修正します</div>
      </section>

      <section class="cards">
        <article class="card">
          <div class="card-title">こんなお悩みありませんか？</div>
          <ul>
            <li>レイアウトが崩れて見た目が悪い</li>
            <li>フォームが動かず機会損失している</li>
          </ul>
        </article>
        <article class="card">
          <div class="card-title">このサービスで解決</div>
          <ul>
            <li>既存サイトの軽微修正を迅速対応</li>
            <li>修正内容を報告して納品後も安心</li>
          </ul>
        </article>
      </section>

      <section class="fixed">
        <div class="pill">
          <div class="label">納期</div>
          <div class="value">最短24時間</div>
        </div>
        <div class="pill">
          <div class="label">対応範囲</div>
          <div class="value">3箇所まで</div>
        </div>
        <div class="pill price">
          <div class="label">キャンペーン価格</div>
          <div class="value">7,500円</div>
        </div>
      </section>
    </main>
  </body>
</html>
