<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coconala Thumbnail</title>
    <style>
      :root {
        --bg-1: #0f4fcf;
        --bg-2: #2f7bff;
        --accent: #ffd54a;
        --text-main: #ffffff;
        --text-sub: #e9f1ff;
        --badge-bg: #ffffff;
        --badge-text: #0c3b9a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1220px;
        height: 1016px;
        font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      }

      .canvas {
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 85% 14%, #59a4ff 0%, rgba(89, 164, 255, 0) 36%),
          radial-gradient(circle at 16% 84%, #4c8eff 0%, rgba(76, 142, 255, 0) 41%),
          linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 100%);
        color: var(--text-main);
        padding: 54px;
        position: relative;
        overflow: hidden;
      }

      .canvas::before,
      .canvas::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        opacity: 0.2;
      }

      .canvas::before {
        width: 290px;
        height: 290px;
        right: -90px;
        top: -70px;
        background: #ffffff;
      }

      .canvas::after {
        width: 200px;
        height: 200px;
        left: -60px;
        bottom: -65px;
        background: #ffffff;
      }

      .badge {
        display: inline-block;
        background: var(--badge-bg);
        color: var(--badge-text);
        padding: 8px 20px;
        border-radius: 999px;
        font-weight: 800;
        font-size: 30px;
        letter-spacing: 0.03em;
      }

      .title {
        margin-top: 28px;
        font-weight: 900;
        line-height: 1.2;
        letter-spacing: 0.01em;
      }

      .title .line1 {
        font-size: 72px;
      }

      .title .line2 {
        font-size: 78px;
        margin-top: 2px;
      }

      .title .accent {
        color: var(--accent);
      }

      .features {
        margin-top: 34px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        max-width: 960px;
      }

      .feature {
        background: rgba(255, 255, 255, 0.16);
        border: 2px solid rgba(255, 255, 255, 0.27);
        border-radius: 14px;
        padding: 12px 18px;
        font-size: 35px;
        font-weight: 700;
        color: var(--text-sub);
      }

      .footer {
        margin-top: 34px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }

      .price {
        font-size: 44px;
        font-weight: 800;
        color: #fff8d8;
      }

      .cta {
        background: var(--accent);
        color: #193980;
        font-size: 36px;
        font-weight: 900;
        padding: 10px 24px;
        border-radius: 14px;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <main class="canvas">
      <div class="badge">最短24時間</div>

      <section class="title">
        <div class="line1">既存Webサイトの修正を</div>
        <div class="line2"><span class="accent">迅速対応</span>します</div>
      </section>

      <section class="features">
        <div class="feature">表示崩れ・文言変更・フォーム不具合</div>
        <div class="feature">3箇所まで対応（スマホ表示も確認）</div>
        <div class="feature">先着5件限定特価｜今だけ9,500円→7,500円</div>
      </section>

      <footer class="footer">
        <div class="price">通常2日 / 特急24時間</div>
        <div class="cta">まずは見積もり相談</div>
      </footer>
    </main>
  </body>
</html>
